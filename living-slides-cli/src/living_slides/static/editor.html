<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Living Slides Editor</title>
    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        .gjs-cv-canvas { top: 0; width: 100%; height: 100%; }

        /* Layout: toolbar(52) always full width; chat is a floating window */
        #toolbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 52px; background: #1c2533; color: #e7f0fb;
            border-bottom: 1px solid #2b3a55;
            display: flex; align-items: center; gap: 4px;
            padding: 0 10px; z-index: 10002;
            overflow-x: auto;
        }
        #gjs {
            position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
        }

        /* Toolbar controls */
        .tb-group {
            display: flex; align-items: center; gap: 2px;
            padding: 0 6px;
            border-right: 1px solid #2b3a55;
            height: 36px;
        }
        .tb-group:last-child { border-right: none; }
        .tb-btn {
            background: transparent; color: #c7d4eb; border: 1px solid transparent;
            padding: 6px 9px; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-family: inherit; min-width: 30px;
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        }
        .tb-btn:hover { background: #2b3a55; color: #fff; }
        .tb-btn:active { transform: translateY(1px); }
        .tb-btn.primary { background: #238636; color: white; border-color: #238636; }
        .tb-btn.primary:hover { background: #2ea043; }
        .tb-btn.danger:hover { background: #6d2c2c; color: #ffb4b4; border-color: #8b3b3b; }

        .tb-select {
            background: #0f1624; color: #e7f0fb;
            border: 1px solid #2b3a55; border-radius: 4px;
            padding: 5px 6px; font-size: 12px; font-family: inherit;
            cursor: pointer; min-width: 60px;
        }
        .tb-select:focus { outline: none; border-color: #58a6ff; }
        .tb-color {
            width: 30px; height: 28px; border: 1px solid #2b3a55;
            border-radius: 4px; background: transparent; cursor: pointer;
            padding: 2px;
        }
        .tb-label {
            font-size: 11px; color: #6b7d99; margin-right: 2px;
        }
        .tb-spacer { flex: 1; }

        /* Save status toast */
        .save-status {
            position: fixed; bottom: 20px; right: 20px;
            background: #238636; color: white;
            padding: 8px 16px; border-radius: 6px;
            font-size: 14px; z-index: 10003;
            display: none; transition: opacity 0.3s;
        }

        /* ============ Chat panel (floating & draggable) ============ */
        #chat-panel {
            position: fixed;
            top: 72px; right: 20px;
            width: 380px; height: 560px;
            min-width: 280px; min-height: 300px;
            max-width: 90vw; max-height: calc(100vh - 80px);
            background: #0f1624; color: #e7f0fb;
            display: flex; flex-direction: column;
            border: 1px solid #2b3a55;
            border-radius: 10px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            z-index: 9999;
            resize: both;
            overflow: hidden;
        }
        body.chat-collapsed #chat-panel { display: none; }

        #chat-header {
            padding: 10px 14px;
            border-bottom: 1px solid #1f2d44;
            display: flex; align-items: center; justify-content: space-between;
            background: #162032;
            cursor: move;
            user-select: none;
            border-radius: 9px 9px 0 0;
        }
        #chat-header::before {
            content: "⋮⋮"; color: #4a5d80;
            margin-right: 8px; font-size: 14px; letter-spacing: -2px;
        }
        #chat-header .title {
            font-size: 14px; font-weight: 700;
            color: #e7f0fb; display: flex; align-items: center; gap: 8px;
        }
        #chat-header .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #3fb950;
        }
        #chat-toggle {
            background: transparent; border: none; color: #8fb8ea;
            font-size: 18px; cursor: pointer; padding: 2px 6px;
        }

        #chat-messages {
            flex: 1; overflow-y: auto;
            padding: 14px; font-size: 13px; line-height: 1.55;
        }
        #chat-messages .empty {
            color: #6b7d99; font-style: italic; text-align: center;
            margin-top: 40px; padding: 0 20px;
        }
        .msg {
            margin-bottom: 14px; padding: 10px 12px;
            border-radius: 8px; word-wrap: break-word; white-space: pre-wrap;
        }
        .msg.user { background: #1e3a5f; border-left: 3px solid #58a6ff; }
        .msg.assistant { background: #1a2942; border-left: 3px solid #3fb950; }
        .msg .msg-meta {
            font-size: 11px; color: #8fb8ea; margin-bottom: 4px;
            display: flex; justify-content: space-between;
        }
        .msg .msg-meta .role { font-weight: 700; }
        .msg .msg-attach {
            background: rgba(130, 80, 223, 0.15);
            border: 1px solid #8250df; border-radius: 4px;
            padding: 4px 8px; margin-top: 6px;
            font-size: 11px; color: #c9b6ff;
            font-family: "Consolas", monospace;
        }

        #chat-attach-bar {
            padding: 8px 14px 0 14px;
            font-size: 11px; color: #8fb8ea; min-height: 22px;
        }
        #chat-attach-bar .attach-chip {
            display: inline-flex; align-items: center;
            background: rgba(130, 80, 223, 0.18);
            border: 1px solid #8250df; border-radius: 4px;
            padding: 3px 8px;
            font-family: "Consolas", monospace; color: #d6c8ff;
            max-width: 100%; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        #chat-attach-bar .attach-chip .pg { color: #8fb8ea; margin-right: 6px; }
        #chat-attach-bar .attach-chip .oid { color: #a5ffa5; }
        #chat-attach-bar.empty { color: #6b7d99; font-style: italic; }

        #chat-input-area {
            border-top: 1px solid #1f2d44;
            padding: 10px 14px 14px 14px;
            background: #162032;
        }
        #chat-input {
            width: 100%; background: #0f1624; color: #e7f0fb;
            border: 1px solid #2b3a55; border-radius: 6px;
            padding: 10px 12px; font-size: 13px; font-family: inherit;
            resize: vertical; min-height: 60px; max-height: 200px;
            box-sizing: border-box;
        }
        #chat-input:focus { outline: none; border-color: #58a6ff; }
        #chat-send-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px;
        }
        #chat-hint { font-size: 11px; color: #6b7d99; }
        #chat-send-btn {
            background: #238636; color: white; border: none;
            padding: 7px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        #chat-send-btn:hover { background: #2ea043; }
        #chat-send-btn:disabled { background: #355c3f; cursor: not-allowed; }

        #chat-reopen {
            position: fixed; top: 68px; right: 20px;
            background: #8250df; color: white; border: none;
            padding: 10px 14px; border-radius: 6px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            z-index: 9998;
            display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }
        #chat-reopen:hover { background: #9463e6; }
        body.chat-collapsed #chat-reopen { display: block; }
    </style>
</head>
<body>
    <!-- ============ Top toolbar (PowerPoint-style) ============ -->
    <div id="toolbar">
        <!-- Font -->
        <div class="tb-group">
            <span class="tb-label">字体</span>
            <select id="tb-font-family" class="tb-select" title="字体">
                <option value="">默认</option>
                <option value="'Microsoft YaHei', 'PingFang SC', sans-serif">微软雅黑</option>
                <option value="'SimSun', serif">宋体</option>
                <option value="'SimHei', sans-serif">黑体</option>
                <option value="'KaiTi', serif">楷体</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Consolas', monospace">Consolas</option>
            </select>
            <select id="tb-font-size" class="tb-select" title="字号" style="min-width:60px;">
                <option value="">字号</option>
                <option>12px</option><option>13px</option><option>14px</option>
                <option>15px</option><option>16px</option><option>17px</option>
                <option>18px</option><option>20px</option><option>22px</option>
                <option>24px</option><option>28px</option><option>32px</option>
                <option>36px</option><option>40px</option><option>48px</option>
                <option>56px</option><option>64px</option>
            </select>
        </div>

        <!-- Style: B I U -->
        <div class="tb-group">
            <button class="tb-btn" id="tb-bold" title="加粗 (Ctrl+B)" style="font-weight:900;">B</button>
            <button class="tb-btn" id="tb-italic" title="斜体 (Ctrl+I)" style="font-style:italic;">I</button>
            <button class="tb-btn" id="tb-underline" title="下划线 (Ctrl+U)" style="text-decoration:underline;">U</button>
            <input type="color" id="tb-color-fg" class="tb-color" title="文字颜色" value="#1f2d3d">
            <input type="color" id="tb-color-bg" class="tb-color" title="背景颜色" value="#ffffff">
        </div>

        <!-- Alignment -->
        <div class="tb-group">
            <button class="tb-btn" id="tb-align-left" title="左对齐">⬅</button>
            <button class="tb-btn" id="tb-align-center" title="居中">⇔</button>
            <button class="tb-btn" id="tb-align-right" title="右对齐">➡</button>
        </div>

        <!-- Insert -->
        <div class="tb-group">
            <span class="tb-label">插入</span>
            <button class="tb-btn" id="tb-ins-block" title="插入卡片块">＋块</button>
            <button class="tb-btn" id="tb-ins-two" title="插入两栏">＋2栏</button>
            <button class="tb-btn" id="tb-ins-three" title="插入三栏">＋3栏</button>
            <button class="tb-btn" id="tb-ins-kpi" title="插入 KPI 行">＋KPI</button>
            <button class="tb-btn" id="tb-ins-item" title="插入标签/要点">＋标签</button>
            <button class="tb-btn" id="tb-ins-image" title="插入图片（自由拖拽定位）" style="background:#8250df;color:#fff;">＋图片</button>
            <input type="file" id="tb-img-file" accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml" style="display:none;">
        </div>

        <!-- Image layer controls -->
        <div class="tb-group">
            <span class="tb-label">图层</span>
            <button class="tb-btn" id="tb-img-front" title="置顶（显示在文字之上）">⬆顶</button>
            <button class="tb-btn" id="tb-img-back" title="置底（降到文字之下）">⬇底</button>
        </div>

        <!-- Edit actions -->
        <div class="tb-group">
            <button class="tb-btn" id="tb-duplicate" title="复制选中">复制</button>
            <button class="tb-btn danger" id="tb-delete" title="删除选中 (Delete)">删除</button>
            <button class="tb-btn" id="tb-undo" title="撤销 (Ctrl+Z)">↶</button>
            <button class="tb-btn" id="tb-redo" title="重做 (Ctrl+Y)">↷</button>
        </div>

        <div class="tb-spacer"></div>

        <!-- Save -->
        <div class="tb-group" style="border-right:none;">
            <button class="tb-btn primary" id="tb-save" title="保存 (Ctrl+S)">💾 保存</button>
        </div>
    </div>

    <div id="gjs"></div>
    <div id="save-status" class="save-status">Saved!</div>

    <!-- ============ Chat panel ============ -->
    <div id="chat-panel">
        <div id="chat-header">
            <div class="title"><span class="dot"></span>Chat · 对话式编辑</div>
            <button id="chat-toggle" title="折叠">✕</button>
        </div>
        <div id="chat-messages">
            <div class="empty">
                点选画布里任意元素，<br>
                告诉我要改什么。<br><br>
                选中元素后下方会出现一个紫色 chip，<br>
                表示这条消息会关联到哪里。
            </div>
        </div>
        <div id="chat-attach-bar" class="empty">无选中 · 消息会作用到整个文档</div>
        <div id="chat-input-area">
            <textarea id="chat-input" placeholder="例如：把这里换成 XXX；后面加一个新的 item …（Enter 发送 · Shift+Enter 换行）"></textarea>
            <div id="chat-send-row">
                <span id="chat-hint">发送后请到终端说一句任意话唤起 Claude 处理</span>
                <button id="chat-send-btn">发送</button>
            </div>
        </div>
    </div>
    <button id="chat-reopen" title="展开对话">💬 Chat</button>

    <script src="https://unpkg.com/grapesjs"></script>
    <script>
      // Cache-bust editor.js on every load so local changes show up immediately.
      (function() {
        var s = document.createElement('script');
        s.src = '/static/editor.js?v=' + Date.now();
        document.body.appendChild(s);
      })();
    </script>
</body>
</html>
